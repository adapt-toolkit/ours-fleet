# fleet.yaml — declarative fleet of persistent agents ("docker-compose for agents").
#
#   ours-fleet up            create/start every role (idempotent)
#   ours-fleet up Alice      only the named role(s)
#   ours-fleet restart       re-sync + bounce, resuming context
#   ours-fleet down          stop everything
#   ours-fleet config        validate + print the merged plan
#
# This file is yours — ours-fleet never edits it. Spawned roles land in
# ~/fleet.d/<Name>.yaml (one machine-written file per role; delete = unspawn).

vars:
  work_root: /home/me/work

defaults:
  harness: claude-code        # adapter for roles that don't set their own
  # model: claude-fable-5       # default model for roles without their own (per-role model / --model wins)
  max_tokens: 500000          # session cap before auto-compact (harness-interpreted)
  monitor:                    # supervisor-owned mail wake (fleet-wide default)
    enabled: true             # true (default): supervisor injects [fleet-monitor] console lines;
    #                         #   false: legacy — the agent arms its own `ours-mcp watch`

  # To make Codex the fleet default instead:
  # harness: codex
  # model: gpt-5.4
  # harness_options:
  #   launcher: auto          # prefer ours-codex; fall back to codex
  #   profile: fleet          # ~/.codex/fleet.config.toml (or $CODEX_HOME equivalent)
  #   sandbox: workspace-write
  #   approval: on-request
  #   monitor: true             # explicit persistent consent for unattended wake
  #   search: true
  #   config:
  #     model_reasoning_effort: high

roles:

  FleetCoordinator:
    identity: FleetCoordinator
    cwd: ${work_root}
    persona: |
      You are the always-on hub of this fleet. You do not do the work yourself —
      you decompose owner goals into tasks, dispatch them to the other roles over
      ours messaging, keep an eye on your wards, and report back.
    bio: |
      Fleet coordinator: routes tasks, oversees worker agents, first point of contact.
    oversee:                  # rendered into the briefing as explicit assignments
      - { role: Alice, interval: 5m }

  Alice:
    coordinator: FleetCoordinator   # announces here on boot
    cwd: ${work_root}/alice
    mission: Own the alice repository end to end.
    # model: claude-fable-5          # launch this role on a specific model (default: launcher default)
    persona: |
      You are Alice, sole owner of the alice repository. Fix things at the source,
      ship sound tests, and escalate cross-repo questions to the coordinator.
    env:
      EXAMPLE_FLAG: "1"             # extra env passed into the session
    monitor:                        # override the fleet default per role (merges key-by-key)
      wake_sources:                 # default: message_received, file_received,
        - message_received          #          local_contact_request, pending_message
        - file_received
      batch_ms: 2000                # coalesce a burst into one console line (default 2000)
      # enabled: false              # opt this role out: it arms its own `ours-mcp watch`
    isolation:                      # OS-level sandbox (additive — omit for today's behavior)
      network: broker               # broker (default): ours messaging works, general egress denied
      resources:                    # per-agent cgroup caps at the pane
        mem: 4G                     # → MemoryMax=4G + MemorySwapMax=0 (hard OOM bound)
        cpu: "2"                    # → CPUQuota=200% (2 cores)
      # backend: auto               # auto (default): bubblewrap if usable, else degrade per on_unavailable
      # on_unavailable: warn        # warn (default): run un-isolated + drop a marker; strict: refuse to launch
      # fs:
      #   read: [ /opt/toolchains ] # extra read-only binds (state dir + cwd are always included)
      #   write: [ ]                # extra read-write binds
      # secrets: [ "${work_root}/.secrets/tok:/run/secrets/tok" ]  # host:container, mounted read-only
    harness_options:                # adapter-owned (claude-code shown)
      plugins:
        "some-plugin@some-marketplace": false
      # mem_palace: false           # example: fully disable a memory plugin for this role

  # CodexReviewer:
  #   harness: codex
  #   coordinator: FleetCoordinator
  #   cwd: ${work_root}/alice
  #   model: gpt-5.4
  #   mission: Review Alice's changes independently.
  #   harness_options:
  #     launcher: auto              # ours-codex when installed, otherwise codex
  #     sandbox: read-only
  #     approval: on-request
  #     monitor: true
